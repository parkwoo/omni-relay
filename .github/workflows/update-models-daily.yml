name: Update Model Database (Daily)

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp
          # Install Playwright for web scraping
          pip install playwright
          playwright install chromium

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Run multi-source model collector
        id: collect
        env:
          # All API keys are OPTIONAL - fallback to scraper or static data
          # Priority: API → Scraper → Static
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY || '' }}
          KILOCODE_API_KEY: ${{ secrets.KILOCODE_API_KEY || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || '' }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY || '' }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || '' }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
        run: |
          python scripts/collect_models_daily.py \
            --output omnirelay/data/free-models.json \
            --pretty

      - name: Check for changes
        id: git-check
        if: github.event.inputs.dry_run != 'true'
        run: |
          git diff --quiet omnirelay/data/free-models.json && echo "has_changes=false" >> $GITHUB_OUTPUT || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            [Auto] Update model database - ${{ steps.date.outputs.date }}

            Automated daily update using multi-source strategy:
            - Priority 1: Provider API (if API key available)
            - Priority 2: Web scraping (Playwright)
            - Priority 3: Static fallback data
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: auto-update-models-${{ github.run_number }}
          delete-branch: true
          title: '[Auto] Daily Model Update - ${{ steps.date.outputs.date }}'
          body: |
            ## Automated Daily Model Database Update

            This PR was automatically generated by the multi-source model collector.

            ### Collection Method
            - **Priority 1**: Provider API (with API key)
            - **Priority 2**: Official website scraping (Playwright)
            - **Priority 3**: Static fallback data

            ### Providers Updated
            - OpenRouter (API/Scraper)
            - Novita AI (API/Scraper)
            - Kilo Gateway (API/Scraper)
            - DeepSeek (API/Scraper/Static)
            - xAI (API/Scraper/Static)
            - Zhipu AI (API/Scraper/Static)
            - Qwen (API/Scraper/Static)
            - Gemini (API/Scraper/Static)
            - OpenAI (API/Scraper/Static)

            ### Metadata
            - Updated: ${{ steps.date.outputs.date }}
            - Triggered by: ${{ github.event_name == 'schedule' && 'Scheduled (daily)' || 'Manual trigger' }}

            ### Data Source Summary
            Check the PR diff to see which source each provider used:
            - `"source": "api"` - Data from provider API (highest confidence)
            - `"source": "scraper"` - Data from official website (medium confidence)
            - `"source": "static"` - Hardcoded fallback data (low confidence, but reliable)

            ### Checklist
            - [ ] Review model changes for each provider
            - [ ] Verify free model listings
            - [ ] Check pricing/credit updates
            - [ ] Ensure data sources look reasonable

            ---
            *Generated by GitHub Actions - Multi-Source Collector*
          labels: |
            automated-pr
            data-update
            daily-update
          assignees: ${{ github.repository_owner }}

      - name: Print summary
        run: |
          echo "## Model Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.git-check.outputs.has_changes == 'true' && 'Changes detected' || 'No changes' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name == 'schedule' && 'Scheduled (daily)' || 'Manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Strategy:** Multi-source (API → Scraper → Static)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f omnirelay/data/free-models.json ]; then
            echo "### Database Stats" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python -c "
import json
with open('omnirelay/data/free-models.json') as f:
    data = json.load(f)
providers = len(data.get('providers', {}))
free_models = sum(len(p.get('free_models', [])) for p in data.get('providers', {}).values())
version = data.get('version', 'unknown')
sources = data.get('metadata', {}).get('data_sources', {})
print(f'Version: {version}')
print(f'Providers: {providers}')
print(f'Free Models: {free_models}')
print(f'Data Sources: {sources}')
" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
